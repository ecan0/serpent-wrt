name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Build (native)
        run: make build

      - name: Check version output
        run: bin/serpent-wrt -version

      - name: Build OpenWrt router targets
        run: make build-openwrt-targets

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

  scan:
    name: Scan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  deploy-test:
    name: Runtime test (openwrt-x86-generic)
    runs-on: self-hosted
    needs: [build, test, lint, scan]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    env:
      OPENWRT_HOST: ${{ secrets.OPENWRT_HOST }}
      OPENWRT_USER: root
    steps:
      - name: Check deploy target configured
        run: |
          if [ -n "$OPENWRT_HOST" ]; then
            echo "DEPLOY_ENABLED=true" >> "$GITHUB_ENV"
          else
            echo "OPENWRT_HOST secret not set — skipping deploy"
          fi

      - uses: actions/checkout@v4
        if: env.DEPLOY_ENABLED == 'true'

      - uses: actions/setup-go@v5
        if: env.DEPLOY_ENABLED == 'true'
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up SSH key
        if: env.DEPLOY_ENABLED == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Check connectivity
        if: env.DEPLOY_ENABLED == 'true'
        run: ping -c 2 "${OPENWRT_HOST#*@}"

      - name: Build OpenWrt x86 generic binary
        if: env.DEPLOY_ENABLED == 'true'
        run: make build-openwrt-x86

      - name: Install and verify on OpenWrt
        if: env.DEPLOY_ENABLED == 'true'
        env:
          OPENWRT_BINARY: bin/serpent-wrt-openwrt-x86
        run: SSH_KEY_PATH="$HOME/.ssh/deploy_key" sh scripts/openwrt-runtime-test.sh

      - name: Clean up SSH key
        if: always() && env.DEPLOY_ENABLED == 'true'
        run: rm -f ~/.ssh/deploy_key
